apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: tasklineapp-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: tasklineapp
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
  namespaceSelector:
    matchNames:
      - default
