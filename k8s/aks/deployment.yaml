apiVersion: apps/v1
kind: Deployment
metadata:
  name: tasklineapp
  labels:
    app: tasklineapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tasklineapp
  template:
    metadata:
      labels:
        app: tasklineapp
    spec:
      containers:
        - name: tasklineapp
          # Use the image reference from your Exercise 2 registry:
          # ACR:        acrtasklineapp.azurecr.io/tasklineapp:v1
          # GHCR:       ghcr.io/YOUR_USERNAME/tasklineapp:v1
          # Docker Hub: YOUR_USERNAME/tasklineapp:v1
          image: YOUR_REGISTRY_PATH:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
