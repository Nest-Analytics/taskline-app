# Azure Key Vault → Kubernetes Secret sync via CSI driver.
# Placeholders are replaced at deploy time using Terraform outputs:
#   KV_TENANT_ID_PLACEHOLDER        → terraform output tenant_id
#   KV_NAME_PLACEHOLDER             → terraform output key_vault_name
#   KV_CSI_CLIENT_ID_PLACEHOLDER    → terraform output csi_user_assigned_identity_client_id
#
# The `secretObjects` block tells the CSI driver to mirror the mounted vault
# secrets into a standard Kubernetes Secret (`taskline-backend-secrets`), so the
# backend deployment can consume them via envFrom like any other secret.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: taskline-backend-kv
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "KV_CSI_CLIENT_ID_PLACEHOLDER"
    keyvaultName: "KV_NAME_PLACEHOLDER"
    tenantId: "KV_TENANT_ID_PLACEHOLDER"
    objects: |
      array:
        - |
          objectName: API
          objectType: secret
        - |
          objectName: DATABASE-URL
          objectType: secret
        - |
          objectName: APPINSIGHTS-CONNECTION-STRING
          objectType: secret
        - |
          objectName: APP-TITLE
          objectType: secret
        - |
          objectName: APP-VERSION
          objectType: secret
        - |
          objectName: PORT
          objectType: secret
  secretObjects:
    - secretName: taskline-backend-secrets
      type: Opaque
      data:
        - objectName: API
          key: API
        - objectName: DATABASE-URL
          key: DATABASE_URL
        - objectName: APPINSIGHTS-CONNECTION-STRING
          key: APPINSIGHTS_CONNECTION_STRING
        - objectName: APP-TITLE
          key: APP_TITLE
        - objectName: APP-VERSION
          key: APP_VERSION
        - objectName: PORT
          key: PORT
